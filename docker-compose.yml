version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: win_al_talab_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: winaltalab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - winaltalab_network

  redis:
    image: redis:7-alpine
    container_name: win_al_talab_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - winaltalab_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: win_al_talab_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - winaltalab_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: win_al_talab_backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@postgres:5432/winaltalab?schema=public
      - JWT_SECRET=${JWT_SECRET:-winaltalab_secret_key_2026}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - PAYMOB_API_KEY=${PAYMOB_API_KEY}
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: unless-stopped
    networks:
      - winaltalab_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: win_al_talab_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - winaltalab_network

networks:
  winaltalab_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
